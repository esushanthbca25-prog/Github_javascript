<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Beautiful To‑Do App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>To‑Do List</h1>

        <form id="todo-form">
            <input type="text" id="todo-input"
                   placeholder="What do you need to do?" required>
            <button type="submit">Add</button>
        </form>

        <ul id="todo-list"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
